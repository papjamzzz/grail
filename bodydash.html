<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grail — Body Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#060A14;color:rgba(210,225,245,0.88);font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden}
:root{
  --bg:#060A14;--card:rgba(10,18,32,0.92);--border:rgba(61,214,200,0.10);
  --cyan:#3DD6C8;--amber:#C9A96E;--green:#3DBA7E;--yellow:#E8A838;--red:#E0556A;
  --text:rgba(210,225,245,0.88);--dim:rgba(160,180,220,0.45);--mid:rgba(180,200,235,0.65);
}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid rgba(61,214,200,0.08);background:rgba(6,10,20,0.96);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:6px;color:var(--amber);text-decoration:none;font-style:italic}
.nav-tagline{font-size:9px;letter-spacing:.22em;color:rgba(201,169,110,0.38);font-family:'Cormorant Garamond',serif;font-style:italic;margin-top:2px}
.nav-views{display:flex;gap:6px}
.nav-pill{padding:6px 16px;border-radius:20px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;color:var(--dim);border:1px solid rgba(61,214,200,0.08);transition:all .25s}
.nav-pill:hover{color:var(--cyan);border-color:rgba(61,214,200,0.25)}
.nav-pill.active{background:rgba(61,214,200,0.08);color:var(--cyan);border-color:rgba(61,214,200,0.3)}

.dash{display:grid;grid-template-columns:260px 1fr 300px;gap:18px;padding:20px 24px;min-height:calc(100vh - 64px);max-width:1380px;margin:0 auto}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;display:flex;flex-direction:column}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--dim);margin-bottom:18px}

/* LEFT — body figure */
.view-toggle{display:flex;gap:6px;margin-bottom:16px}
.vt-btn{flex:1;padding:7px;background:none;border:1px solid rgba(61,214,200,0.12);border-radius:8px;color:var(--dim);font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.vt-btn.active{background:rgba(61,214,200,0.08);border-color:rgba(61,214,200,0.35);color:var(--cyan)}
.body-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
#svgFront,#svgBack{width:100%;max-width:190px;height:auto}
.body-legend{display:flex;gap:14px;justify-content:center;margin-top:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.btip{position:fixed;background:rgba(6,10,20,0.97);border:1px solid rgba(61,214,200,0.22);border-radius:10px;padding:10px 14px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;max-width:190px}
.btip.on{opacity:1}
.btip-label{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text);margin-bottom:3px}
.btip-sys{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.btip-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.btip-fill{height:100%;border-radius:2px}

/* CENTER — score + insight */
.center-panel{align-items:center}
.score-orb-wrap{position:relative;width:240px;height:240px;flex-shrink:0;margin-bottom:20px}
#cellCanvas{width:240px;height:240px;border-radius:50%;display:block}
.orb-ring{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid rgba(61,214,200,0.18);box-shadow:0 0 40px rgba(61,214,200,0.06),inset 0 0 30px rgba(61,214,200,0.03);pointer-events:none}
.orb-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.orb-score{font-family:'Cormorant Garamond',serif;font-size:68px;font-weight:300;line-height:1;color:#fff;text-shadow:0 0 28px rgba(61,214,200,0.45)}
.orb-denom{font-size:9px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-top:3px}
.orb-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);margin-top:5px}
.score-sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:18px}
.insight-card{width:100%;background:rgba(61,214,200,0.04);border:1px solid rgba(61,214,200,0.10);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.insight-pos{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:rgba(210,225,245,0.82);line-height:1.55;margin-bottom:10px}
.insight-detail{font-size:11px;color:var(--mid);line-height:1.6}
.actions-title{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);width:100%;margin-bottom:10px}
.action-item{width:100%;display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.04);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.action-item:hover{border-color:rgba(61,214,200,0.18)}
.action-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.action-text{flex:1}
.action-main{font-size:12px;color:var(--text);margin-bottom:2px;line-height:1.4}
.action-why{font-size:10px;color:var(--dim);line-height:1.4}
.action-impact{flex-shrink:0;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);background:rgba(61,214,200,0.08);border-radius:4px;padding:2px 7px;align-self:flex-start;margin-top:2px}

/* RIGHT — goals */
.goal-tabs{display:flex;gap:4px;margin-bottom:18px}
.goal-tab{flex:1;padding:7px 4px;background:none;border:1px solid rgba(201,169,110,0.10);border-radius:8px;color:var(--dim);font-size:9px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.goal-tab.active{background:rgba(201,169,110,0.06);border-color:rgba(201,169,110,0.3);color:var(--amber)}
.goal-list{display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:12px 13px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.04);border-radius:10px;flex-shrink:0}
.goal-check{width:17px;height:17px;border-radius:50%;border:1.5px solid rgba(201,169,110,0.28);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:9px;color:#fff}
.goal-check.done{background:var(--amber);border-color:var(--amber)}
.goal-body{flex:1}
.goal-text{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:2px}
.goal-text.done{opacity:.4;text-decoration:line-through}
.goal-why{font-size:10px;color:var(--dim);line-height:1.4}
.goal-badge{font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:rgba(232,168,56,0.10);color:var(--amber);flex-shrink:0;align-self:flex-start;margin-top:2px}

/* DETAIL */
.detail{position:fixed;right:-400px;top:0;bottom:0;width:370px;background:rgba(5,8,18,0.98);border-left:1px solid rgba(61,214,200,0.12);padding:30px 26px;overflow-y:auto;transition:right .3s cubic-bezier(.2,.8,.2,1);z-index:300;backdrop-filter:blur(20px)}
.detail.open{right:0}
.detail-x{position:absolute;top:18px;right:18px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer}
.d-dot{width:9px;height:9px;border-radius:50%;margin-bottom:10px}
.d-label{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);margin-bottom:3px}
.d-sys{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);margin-bottom:18px}
.d-bar-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:18px}
.d-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.d-insight{font-size:12px;color:var(--mid);line-height:1.75;margin-bottom:18px}
.d-hr{height:1px;background:rgba(255,255,255,0.05);margin-bottom:18px}
.d-rec-group{margin-bottom:13px}
.d-rec-type{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.d-rec-text{font-size:12px;color:var(--mid);line-height:1.6}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(61,214,200,0.15);border-radius:2px}
</style>
</head>
<body>

  <div>
    <a href="/" class="nav-brand">grail</a>

    <div class="body-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Optimal</div>

      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Act</div>

  </div>

  <!-- CENTER: Score + Insight -->
  <div class="panel center-panel">
    <div class="panel-title">BioBaseline Score</div>

      <div class="orb-ring"></div>

  <!-- RIGHT: Goals -->

    <div class="panel-title">Your Goals</div>
    <div class="goal-tabs">

<script>
const BM=[
  {id:'sleep_dur',label:'Sleep Duration',side:'front',x:78,y:22,pct:72,system:'Recovery',unit:'hrs',insight:'Sleep is your body\'s master repair cycle. Every hour you protect shapes hormones, immunity, and cognition — nothing else comes close.',rec:{diet:'Magnesium glycinate 200mg 1hr before bed',move:'Morning sunlight within 30min anchors your circadian rhythm',sleep:'No screens after 9pm — blue light blocks melatonin by up to 50%',green:'Sleep is locked in. Your body is doing its nightly rebuild.'}},
  {id:'deep_sleep',label:'Deep Sleep %',side:'front',x:90,y:16,pct:65,system:'Recovery',unit:'%',insight:'Deep sleep is the only time your brain physically shrinks to flush metabolic waste. Tissue rebuilds and growth hormone peaks exclusively here.',rec:{diet:'Avoid alcohol within 3hrs of bed — it collapses deep sleep dramatically',move:'Strength training in the morning meaningfully increases slow-wave sleep',sleep:'Keep room below 67°F — core temp drop is what triggers deep sleep',green:'Deep sleep is dialed. Brain and body are doing their nightly rebuild.'}},
  {id:'rem_sleep',label:'REM Sleep %',side:'front',x:102,y:22,pct:70,system:'Recovery',unit:'%',insight:'REM is emotional processing, memory consolidation, and creativity. Alcohol and late eating crush it — often invisibly.',rec:{diet:'B6 supports REM — salmon, chickpeas, and bananas are rich sources',move:'Moderate aerobic exercise reliably increases REM duration',sleep:'Consistent wake time is the single most powerful REM protector',green:'REM is cycling beautifully. Processing and creativity are both supported.'}},
  {id:'hrv',label:'HRV',side:'front',x:90,y:30,pct:68,system:'Recovery',unit:'ms',insight:'HRV is the most accurate daily window into nervous system health. Low HRV means your body is under load — physical, emotional, or inflammatory.',rec:{diet:'Omega-3s support autonomic balance — 2g EPA+DHA daily',move:'Zone 2 cardio 3–4x/week is the most reliable long-term HRV builder',sleep:'Sleep consistency is the single best HRV intervention that exists',green:'HRV is strong. Nervous system is balanced and ready to perform.'}},
  {id:'cortisol',label:'Cortisol',side:'front',x:112,y:40,pct:62,system:'Hormones',unit:'μg/dL',insight:'Cortisol should peak sharply at dawn and fall all day. Disrupted rhythm drives fat storage, inflammation, anxiety, and poor sleep.',rec:{diet:'Ashwagandha KSM-66 300mg is the most studied cortisol supplement',move:'Intense morning training aligns with your natural cortisol peak',sleep:'Dark, cool room at night signals safety to your nervous system',green:'Stress response is calibrated. You are not running from lions.'}},
  {id:'tsh',label:'TSH / Thyroid',side:'front',x:90,y:76,pct:74,system:'Thyroid',unit:'mIU/L',insight:'TSH is the thermostat of your metabolism. Small shifts cascade into changes in energy, mood, body temperature, and weight.',rec:{diet:'Selenium 200mcg and iodine are foundational for thyroid function',move:'Resistance training improves thyroid hormone sensitivity',sleep:'Chronic sleep deprivation stresses the entire thyroid axis',green:'Thyroid is perfectly tuned. Metabolism is running at the right speed.'}},
  {id:'resting_hr',label:'Resting HR',side:'front',x:72,y:118,pct:78,system:'Heart',unit:'bpm',insight:'A low resting heart rate means your heart pumps more blood per beat. Elite athletes sit at 40–50bpm. Every saved beat extends your engine.',rec:{diet:'Potassium and magnesium both support healthy cardiac rhythm',move:'Zone 2 cardio is the most effective long-term resting HR reducer',sleep:'7–9hrs consistently lowers resting HR over weeks — it\'s documented',green:'Heart is efficient. Beating steady and strong with minimal effort.'}},
  {id:'active_hr',label:'Active HR',side:'front',x:80,y:130,pct:71,system:'Heart',unit:'bpm',insight:'How your heart responds to exertion tells the whole cardiovascular fitness story. Lower active HR at the same effort equals greater efficiency.',rec:{diet:'Beet root juice 500ml raises nitric oxide and improves cardiac output',move:'Interval training improves cardiac output and efficiency measurably',sleep:'Well-rested hearts recover faster between beats during exertion',green:'Active heart response is excellent. Cardiovascular fitness is showing.'}},
  {id:'spo2',label:'SpO₂',side:'front',x:108,y:114,pct:88,system:'Heart',unit:'%',insight:'Blood oxygen saturation. Above 98% is optimal. Below 95% is clinically meaningful. A wearable at night catches what daytime readings miss.',rec:{diet:'Iron-rich foods support oxygen-carrying red blood cell capacity',move:'Breath training and altitude exposure improve SpO2 over time',sleep:'Check if SpO2 dips at night — that\'s a sleep apnea signal worth investigating',green:'Oxygen saturation is optimal. Every cell is being fully fed.'}},

function getStatus(p){if(p>=68)return{color:'var(--green)',label:'Optimal'};if(p>=42)return{color:'var(--yellow)',label:'Monitor'};return{color:'var(--red)',label:'Act'}}
function calcScore(){return Math.round(BM.reduce((s,b)=>s+b.pct,0)/BM.length)}

function getTopActions(){
  const bad=BM.filter(b=>b.pct<68);
  const map={};
  bad.forEach(b=>{['diet','move','sleep'].forEach(t=>{const tx=b.rec[t];if(!tx)return;const k=tx.slice(0,45);if(!map[k])map[k]={text:tx,type:t,count:0,markers:[]};map[k].count++;map[k].markers.push(b.label)})});
  return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,3);
}

function getInsight(s){
  const greens=BM.filter(b=>b.pct>=68);const best=[...BM].sort((a,b)=>b.pct-a.pct)[0];
  let pos,det;
  if(s>=80){pos=`You're operating in elite territory. ${greens.length} of ${BM.length} biomarkers are optimized — your body is working with you, not against you.`;det=`Your strongest marker is ${best.label}. Systems like ${greens.slice(0,3).map(b=>b.label).join(', ')} are all firing well. The goal now is protecting what's working.`}
  else if(s>=65){pos=`${greens.length} of your ${BM.length} biomarkers are in the optimal zone. That's a solid foundation — your body has real assets to build from.`;det=`${best.label} is leading the way. The markers below optimal aren't failures — they're your highest-leverage opportunities. Small changes here move the whole score.`}
  else if(s>=50){pos=`You have ${greens.length} biomarkers already optimized. That's where we build from — not from scratch, but from a base that's already partially dialed in.`;det=`${best.label} is your strongest system right now. The biomarkers below optimal are among the most responsive to intervention. This score can move quickly.`}
  else{pos=`You're early in the process — and that's actually the best place to be. Every marker you improve from here will compound.`;det=`${best.label} is your current anchor point. Focus on the 2–3 highest-impact interventions below. Stacking small wins is how this score moves.`}
  return{pos,det};
}

// ── CELLS ANIMATION ────────────────────────────────────────────────
const canvas=document.getElementById('cellCanvas');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height,CX=W/2,CY=H/2;
const score=calcScore();
const gr=BM.filter(b=>b.pct>=68).length/BM.length;
const yr=BM.filter(b=>b.pct>=42&&b.pct<68).length/BM.length;
function cellColor(i){const n=13,gc=Math.round(gr*n),yc=Math.round(yr*n);if(i<gc)return{h:158,s:.5,l:.44};if(i<gc+yc)return{h:36,s:.72,l:.5};return{h:348,s:.58,l:.5}}
const CELLS=Array.from({length:13},(_,i)=>{const a=(i/13)*Math.PI*2,d=(.1+Math.random()*.28)*CX,c=cellColor(i);return{x:CX+Math.cos(a)*d,y:CY+Math.sin(a)*d,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:11+Math.random()*10,phase:Math.random()*Math.PI*2,spd:.28+Math.random()*.38,color:c,op:.52+Math.random()*.24}});
let t=0;
function drawCells(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.beginPath();ctx.arc(CX,CY,CX,0,Math.PI*2);ctx.clip();
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,CX);
  bg.addColorStop(0,'rgba(18,32,52,0.85)');bg.addColorStop(1,'rgba(4,6,14,0.95)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  CELLS.forEach(c=>{
    c.x+=c.vx;c.y+=c.vy;
    const dx=c.x-CX,dy=c.y-CY,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>CX*.7){c.vx-=dx*.002;c.vy-=dy*.002}
    c.vx*=.998;c.vy*=.998;c.vx+=(Math.random()-.5)*.04;c.vy+=(Math.random()-.5)*.04;
    const pulse=Math.sin(t*c.spd+c.phase)*.5+.5,pr=c.r*(.88+pulse*.22);
    const{h,s,l}=c.color,al=c.op*(.7+pulse*.3);
    const grd=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,pr*2.4);
    grd.addColorStop(0,`hsla(${h},${s*100}%,${l*100}%,${al*.32})`);
    grd.addColorStop(1,`hsla(${h},${s*100}%,${l*100}%,0)`);
    ctx.beginPath();ctx.arc(c.x,c.y,pr*2.4,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    const crd=ctx.createRadialGradient(c.x-pr*.3,c.y-pr*.3,0,c.x,c.y,pr);
    crd.addColorStop(0,`hsla(${h},${s*100}%,${(l+.15)*100}%,${al})`);
    crd.addColorStop(.6,`hsla(${h},${s*100}%,${l*100}%,${al*.8})`);
    crd.addColorStop(1,`hsla(${h},${s*100}%,${(l-.1)*100}%,${al*.35})`);
    ctx.beginPath();ctx.arc(c.x,c.y,pr,0,Math.PI*2);ctx.fillStyle=crd;ctx.fill();
    ctx.beginPath();ctx.arc(c.x,c.y,pr,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${h},${s*100}%,${(l+.2)*100}%,${al*.45})`;ctx.lineWidth=1;ctx.stroke();
  });
  ctx.restore();t+=.011;requestAnimationFrame(drawCells);
}
drawCells();

const tip=document.getElementById('btip');
function makeDot(bm,svgEl,groupId){
  const g=svgEl.getElementById(groupId);if(!g)return;
  const st=getStatus(bm.pct);
  const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',bm.x);ring.setAttribute('cy',bm.y);ring.setAttribute('r','7.5');
  ring.setAttribute('fill','none');ring.setAttribute('stroke',st.color.replace('var(--green)','#3DBA7E').replace('var(--yellow)','#E8A838').replace('var(--red)','#E0556A'));
  ring.setAttribute('stroke-width','1.2');ring.setAttribute('opacity','0.3');
  g.appendChild(ring);
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  const col=st.color.replace('var(--green)','#3DBA7E').replace('var(--yellow)','#E8A838').replace('var(--red)','#E0556A');
  c.setAttribute('cx',bm.x);c.setAttribute('cy',bm.y);c.setAttribute('r','4.5');
  c.setAttribute('fill',col);c.setAttribute('cursor','pointer');c.setAttribute('opacity','0.92');
  c.style.filter=`drop-shadow(0 0 5px ${col})`;
  g.appendChild(c);
  c.addEventListener('mouseenter',e=>{
    tip.classList.add('on');
    document.getElementById('btipLabel').textContent=bm.label;
    document.getElementById('btipSys').textContent=bm.system+' · '+getStatus(bm.pct).label;
    document.getElementById('btipFill').style.width=bm.pct+'%';
    document.getElementById('btipFill').style.background=col;
    moveTip(e);
  });
  c.addEventListener('mousemove',moveTip);
  c.addEventListener('mouseleave',()=>tip.classList.remove('on'));
  c.addEventListener('click',()=>openDetail(bm));
}
function moveTip(e){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px'}
function renderDots(){
  const fSvg=document.getElementById('svgFront'),bSvg=document.getElementById('svgBack');

    recsEl.appendChild(d);
  });
  if(bm.pct>=68&&bm.rec.green){const d=document.createElement('div');d.className='d-rec-group';d.innerHTML=`<div class="d-rec-type" style="color:#3DBA7E">Status: Optimal</div><div class="d-rec-text" style="color:#3DBA7E;opacity:.7;font-style:italic">${bm.rec.green}</div>`;recsEl.appendChild(d)}
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open')}

renderScore();renderInsight();renderActions();renderDots();renderGoals();
</script>
</body>
</html>
