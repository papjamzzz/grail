<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grail — BioBaseline</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─── THEME ─────────────────────────────────────────────── */
:root{--green:#2DC46A;--yellow:#F5A623;--red:#E0556A}
[data-theme="light"]{
  --bg:#F2F2F7;--card:#FFFFFF;--cardhov:#F6F6FB;
  --border:rgba(0,0,0,0.07);--sh:0 1px 8px rgba(0,0,0,0.06),0 0 1px rgba(0,0,0,0.04);
  --sh2:0 4px 22px rgba(0,0,0,0.10);
  --text:#1C1C1E;--mid:#3A3A3C;--dim:#8E8E93;
  --cyan:#007AFF;--amber:#FF9F0A;
  --bf:#E1E1E6;--bs:rgba(28,28,30,0.20);--bh:#2C1A0E;--bsk:#F5EDE0;
}
[data-theme="dark"]{
  --bg:#060A14;--card:rgba(12,20,36,0.94);--cardhov:rgba(18,28,48,0.96);
  --border:rgba(255,255,255,0.07);--sh:0 2px 12px rgba(0,0,0,0.35);
  --sh2:0 8px 32px rgba(0,0,0,0.50);
  --text:rgba(215,228,248,0.92);--mid:rgba(185,205,238,0.72);--dim:rgba(155,178,220,0.50);
  --cyan:#3DD6C8;--amber:#C9A96E;
  --bf:rgba(61,214,200,0.05);--bs:rgba(61,214,200,0.28);--bh:rgba(201,169,110,0.85);--bsk:rgba(61,214,200,0.03);
}

/* ─── BASE ──────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',system-ui,sans-serif;overflow-x:hidden;transition:background .28s,color .28s}

/* ─── NAV ───────────────────────────────────────────────── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:var(--sh);
}
.nav-brand{font-size:18px;font-weight:900;letter-spacing:5px;color:var(--cyan);text-decoration:none}
.nav-tagline{font-size:9px;font-weight:500;letter-spacing:.2em;color:var(--dim);margin-top:1px}
.nav-right{display:flex;align-items:center;gap:7px}
.nav-pill{
  padding:6px 13px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;text-decoration:none;color:var(--dim);
  border:1.5px solid var(--border);transition:all .2s;font-family:'Outfit',sans-serif;
}
.nav-pill:hover{color:var(--cyan);border-color:var(--cyan)}
.nav-pill.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.theme-row{display:flex;align-items:center;gap:7px;margin-left:6px}
.theme-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.tog{width:46px;height:26px;border-radius:13px;cursor:pointer;border:none;outline:none;
  padding:3px;background:rgba(0,0,0,0.1);display:flex;align-items:center;transition:background .28s}
[data-theme="dark"] .tog{background:rgba(61,214,200,0.22)}
.tog-k{width:20px;height:20px;border-radius:50%;background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.22);transition:transform .28s;flex-shrink:0}
[data-theme="dark"] .tog-k{transform:translateX(20px);background:var(--cyan)}

/* ─── LAYOUT ────────────────────────────────────────────── */
.dash{
  display:grid;grid-template-columns:248px 1fr 288px;
  gap:14px;padding:16px 20px;
  min-height:calc(100vh - 56px);max-width:1380px;margin:0 auto;
}
.panel{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:20px;display:flex;flex-direction:column;box-shadow:var(--sh);
}
.ptitle{font-size:9px;font-weight:800;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}

/* ─── LEFT: BODY ────────────────────────────────────────── */
.vt{display:flex;gap:6px;margin-bottom:12px}
.vt-b{
  flex:1;padding:7px;background:none;border:1.5px solid var(--border);border-radius:10px;
  color:var(--dim);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.vt-b.active{background:var(--cyan);border-color:var(--cyan);color:#fff}
.bwrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:6px 0}
.bwrap svg{width:100%;max-width:164px;height:auto;display:block}
.bleg{display:flex;gap:12px;justify-content:center;margin-top:10px}
.bli{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.bld{width:8px;height:8px;border-radius:50%}
/* tooltip */
.btip{
  position:fixed;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;font-size:11px;font-weight:500;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:500;max-width:180px;box-shadow:var(--sh2);
}
.btip.on{opacity:1}
.btn{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px}
.bts{font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.btb{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.btf{height:100%;border-radius:2px}

/* ─── CENTER ────────────────────────────────────────────── */
.center-panel{align-items:center}
.bblabel{
  font-size:11px;font-weight:900;letter-spacing:.44em;text-transform:uppercase;
  color:var(--cyan);margin-bottom:8px;text-align:center;
}
.swrap{position:relative;width:188px;height:188px;flex-shrink:0;margin-bottom:10px}
.ssvg{position:absolute;inset:0;width:100%;height:100%}
.sover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.snum{font-size:58px;font-weight:900;line-height:1;color:var(--text);letter-spacing:-2px}
.sout{font-size:11px;font-weight:600;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-top:2px}
.sstatus{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:13px}

.icard{
  width:100%;background:rgba(0,122,255,0.04);border:1.5px solid rgba(0,122,255,0.10);
  border-radius:14px;padding:14px 16px;margin-bottom:12px;
}
[data-theme="dark"] .icard{background:rgba(61,214,200,0.04);border-color:rgba(61,214,200,0.10)}
.ihead{font-size:14px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:6px}
.ibod{font-size:11px;font-weight:400;color:var(--dim);line-height:1.65}

.sectitle{font-size:10px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);width:100%;margin-bottom:10px}

/* ─── ACTION CARDS ──────────────────────────────────────── */
.acard{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all .22s;overflow:hidden;
}
.acard:hover{border-color:var(--cyan);box-shadow:var(--sh2)}
.acard.open{border-color:var(--cyan);background:var(--cardhov)}
.atop{display:flex;align-items:center;gap:13px;padding:14px 15px}
.aico{font-size:30px;flex-shrink:0;line-height:1;min-width:36px;text-align:center}
.atxt{flex:1;min-width:0}
.atitle{font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;line-height:1.3}
.asub{font-size:10px;font-weight:500;color:var(--dim);line-height:1.4}
.abadge{
  flex-shrink:0;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--cyan);background:rgba(0,122,255,0.08);border-radius:6px;padding:3px 8px;align-self:flex-start;
}
[data-theme="dark"] .abadge{color:var(--cyan);background:rgba(61,214,200,0.10)}
.achev{font-size:11px;color:var(--dim);transition:transform .22s;flex-shrink:0}
.acard.open .achev{transform:rotate(180deg)}
.aexp{max-height:0;overflow:hidden;transition:max-height .35s ease;border-top:0px solid var(--border)}
.acard.open .aexp{max-height:500px;border-top-width:1px}
.aexin{padding:14px 15px 16px}
.axs{margin-bottom:12px}
.axlbl{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.axtxt{font-size:11px;font-weight:400;color:var(--mid);line-height:1.65}
.axtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.axtag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--border);color:var(--dim)}

/* ─── RIGHT: GOALS ──────────────────────────────────────── */
.gtabs{display:flex;gap:5px;margin-bottom:14px}
.gtab{
  flex:1;padding:7px 4px;background:none;border:1.5px solid var(--border);border-radius:10px;
  color:var(--dim);font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.gtab.active{background:var(--amber);border-color:var(--amber);color:#fff}
.glist{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.gitem{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 12px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;flex-shrink:0;
}
.gchk{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(200,160,80,0.35);flex-shrink:0;margin-top:1px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:10px;color:#fff;font-weight:700;
}
.gchk.done{background:var(--amber);border-color:var(--amber)}
.gbody{flex:1}
.gtxt{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:2px}
.gtxt.done{opacity:.4;text-decoration:line-through}
.gwhy{font-size:10px;font-weight:400;color:var(--dim);line-height:1.4}
.gbadge{font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:rgba(255,159,10,0.10);color:var(--amber);flex-shrink:0;align-self:flex-start}

/* ─── DETAIL DRAWER ─────────────────────────────────────── */
.detail{
  position:fixed;right:-410px;top:0;bottom:0;width:380px;
  background:var(--card);border-left:1px solid var(--border);
  padding:28px 24px;overflow-y:auto;
  transition:right .3s cubic-bezier(.2,.8,.2,1);z-index:400;
  backdrop-filter:blur(20px);box-shadow:-4px 0 40px rgba(0,0,0,0.14);
}
.detail.open{right:0}
.dx{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;font-family:'Outfit',sans-serif}
.ddot{width:10px;height:10px;border-radius:50%;margin-bottom:10px}
.dlbl{font-size:26px;font-weight:900;color:var(--text);margin-bottom:3px}
.dsys{font-size:9px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);margin-bottom:16px}
.dtrk{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px}
.dbar{height:100%;border-radius:2px;transition:width .5s}
.dins{font-size:12px;font-weight:400;color:var(--mid);line-height:1.75;margin-bottom:16px}
.dhr{height:1px;background:var(--border);margin-bottom:16px}
.drec{margin-bottom:13px}
.drec-t{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.drec-b{font-size:12px;font-weight:400;color:var(--mid);line-height:1.65}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.10);border-radius:2px}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.10)}
</style>
</head>
<body>

<nav>
  <div>
    <div class="nav-brand">GRAIL</div>
    <div class="nav-tagline">Precision Longevity Intelligence</div>
  </div>
  <div class="nav-right">
    <a href="/" class="nav-pill">Orbital</a>
    <a href="/cells" class="nav-pill">Cells</a>

    <a href="/console" class="nav-pill active">Console</a>
    <div class="theme-row">
      <span class="theme-lbl" id="themeLbl">Light</span>
      <button class="tog" id="themeBtn"><div class="tog-k"></div></button>
    </div>
  </div>
</nav>

<div class="dash">

<!-- ── LEFT: BODY MAP ─────────────────────────────────────── -->
<div class="panel">
  <div class="ptitle">Body Map — 40 Markers</div>
  <div class="vt">
    <button class="vt-b active" id="btnFront" onclick="setView('front')">Front</button>
    <button class="vt-b" id="btnBack" onclick="setView('back')">Back</button>
  </div>
  <div class="bwrap">

    <!-- FRONT -->
    <svg id="svgFront" viewBox="0 0 220 498" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="gf" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2.6" result="b"/>
          <feComposite in="SourceGraphic" in2="b" operator="over"/>
        </filter>
      </defs>

      <!-- HAIR — wavy, natural -->
      <path d="M80,50 C80,22 87,11 110,9 C133,11 140,22 140,50
               C147,32 145,13 133,7 C123,2 116,5 110,6 C104,5 97,2 87,7 C75,13 73,32 80,50 Z"
            fill="var(--bh)" opacity="0.9"/>
      <path d="M80,50 C76,38 74,26 78,16" stroke="var(--bh)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M140,50 C144,38 146,26 142,16" stroke="var(--bh)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.5"/>

      <!-- HEAD -->
      <ellipse cx="110" cy="50" rx="30" ry="32" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.8"/>
      <!-- Ears -->
      <ellipse cx="80" cy="52" rx="5" ry="7" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.4"/>
      <ellipse cx="140" cy="52" rx="5" ry="7" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.4"/>
      <!-- Face minimal -->
      <circle cx="103" cy="46" r="2.2" fill="var(--bs)" opacity="0.55"/>
      <circle cx="117" cy="46" r="2.2" fill="var(--bs)" opacity="0.55"/>
      <path d="M105,60 Q110,65 115,60" stroke="var(--bs)" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.38"/>

      <!-- NECK -->
      <rect x="103" y="81" width="14" height="17" rx="5" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.5"/>

      <!-- LEFT ARM — filled pill shape -->
      <path d="M76,102 C64,106 50,120 44,145 L38,204 L36,258 C36,269 40,278 50,281 L52,291
               C54,282 57,268 60,256 L66,208 L72,150 C74,133 77,118 80,110 Z"
            fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.6" stroke-linejoin="round"/>

      <!-- RIGHT ARM -->
      <path d="M144,102 C156,106 170,120 176,145 L182,204 L184,258 C184,269 180,278 170,281 L168,291
               C166,282 163,268 160,256 L154,208 L148,150 C146,133 143,118 140,110 Z"
            fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.6" stroke-linejoin="round"/>

      <!-- TORSO + LEGS — single clean path -->
      <path d="
        M 76,102
        C 70,106 63,117 61,134
        L 57,176 C 55,199 57,220 65,234
        L 69,248 L 75,272 L 79,302
        L 77,358 L 75,418 L 73,456
        C 73,467 77,475 87,475
        L 101,475 L 103,456 L 105,418
        L 107,362 L 109,306 L 111,262
        L 113,306 L 115,362 L 117,418
        L 119,456 L 121,475
        L 133,475 C 143,475 147,467 147,456
        L 145,418 L 143,358 L 141,302
        L 145,272 L 151,248 L 155,234
        C 163,220 165,199 163,176
        L 159,134 C 157,117 150,106 144,102 Z"
            fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.8" stroke-linejoin="round"/>

      <!-- Collarbone subtle -->
      <path d="M84,100 Q110,94 136,100" fill="none" stroke="var(--bs)" stroke-width="1" opacity="0.16"/>

      <g id="dotsF"></g>
    </svg>

    <!-- BACK -->
    <svg id="svgBack" viewBox="0 0 220 498" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <!-- HAIR -->
      <path d="M80,50 C80,22 87,11 110,9 C133,11 140,22 140,50
               C147,32 145,13 133,7 C123,2 116,5 110,6 C104,5 97,2 87,7 C75,13 73,32 80,50 Z"
            fill="var(--bh)" opacity="0.9"/>
      <path d="M80,50 C76,38 74,26 78,16" stroke="var(--bh)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M140,50 C144,38 146,26 142,16" stroke="var(--bh)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.5"/>
      <!-- HEAD -->
      <ellipse cx="110" cy="50" rx="30" ry="32" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.8"/>
      <ellipse cx="80" cy="52" rx="5" ry="7" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.4"/>
      <ellipse cx="140" cy="52" rx="5" ry="7" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.4"/>
      <!-- NECK -->
      <rect x="103" y="81" width="14" height="17" rx="5" fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.5"/>
      <!-- LEFT ARM -->
      <path d="M76,102 C64,106 50,120 44,145 L38,204 L36,258 C36,269 40,278 50,281 L52,291
               C54,282 57,268 60,256 L66,208 L72,150 C74,133 77,118 80,110 Z"
            fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.6" stroke-linejoin="round"/>
      <!-- RIGHT ARM -->
      <path d="M144,102 C156,106 170,120 176,145 L182,204 L184,258 C184,269 180,278 170,281 L168,291
               C166,282 163,268 160,256 L154,208 L148,150 C146,133 143,118 140,110 Z"
            fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.6" stroke-linejoin="round"/>
      <!-- BODY -->
      <path d="
        M 76,102 C 70,106 63,117 61,134
        L 57,176 C 55,199 57,220 65,234
        L 69,248 L 75,272 L 79,302
        L 77,358 L 75,418 L 73,456
        C 73,467 77,475 87,475
        L 101,475 L 103,456 L 105,418
        L 107,362 L 109,306 L 111,262
        L 113,306 L 115,362 L 117,418
        L 119,456 L 121,475
        L 133,475 C 143,475 147,467 147,456
        L 145,418 L 143,358 L 141,302
        L 145,272 L 151,248 L 155,234
        C 163,220 165,199 163,176
        L 159,134 C 157,117 150,106 144,102 Z"
            fill="var(--bsk)" stroke="var(--bs)" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Spine + shoulder blade hints -->
      <path d="M110,100 L110,238" stroke="var(--bs)" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.16"/>
      <ellipse cx="92" cy="136" rx="15" ry="20" fill="none" stroke="var(--bs)" stroke-width="1" opacity="0.11"/>
      <ellipse cx="128" cy="136" rx="15" ry="20" fill="none" stroke="var(--bs)" stroke-width="1" opacity="0.11"/>
      <g id="dotsB"></g>
    </svg>

  </div>
  <div class="bleg">
    <div class="bli"><div class="bld" style="background:#2DC46A;box-shadow:0 0 6px rgba(45,196,106,0.6)"></div>Optimal</div>
    <div class="bli"><div class="bld" style="background:#F5A623;box-shadow:0 0 6px rgba(245,166,35,0.6)"></div>Monitor</div>
    <div class="bli"><div class="bld" style="background:#E0556A;box-shadow:0 0 6px rgba(224,85,106,0.6)"></div>Act</div>
  </div>
</div>

<!-- ── CENTER ─────────────────────────────────────────────── -->
<div class="panel center-panel">
  <div class="bblabel">BIOBASELINE</div>

  <div class="swrap">
    <svg class="ssvg" viewBox="0 0 188 188" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="188" y2="188" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#007AFF"/>
          <stop offset="55%" stop-color="#30D158"/>
          <stop offset="100%" stop-color="#2DC46A"/>
        </linearGradient>
        <linearGradient id="agd" x1="0" y1="0" x2="188" y2="188" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#3DD6C8"/>
          <stop offset="100%" stop-color="#2DC46A"/>
        </linearGradient>
      </defs>
      <!-- Track -->
      <circle cx="94" cy="94" r="80" stroke="rgba(0,0,0,0.06)" stroke-width="10"/>
      <!-- Glow -->
      <circle id="glowRing" cx="94" cy="94" r="80" stroke="url(#ag)" stroke-width="15"
              stroke-linecap="round" stroke-dasharray="503" stroke-dashoffset="503"
              transform="rotate(-90 94 94)" opacity="0.14"
              style="transition:stroke-dashoffset 1.6s cubic-bezier(.2,.8,.2,1)"/>
      <!-- Arc -->
      <circle id="scoreArc" cx="94" cy="94" r="80" stroke="url(#ag)" stroke-width="10"

const calcScore=()=>Math.round(BM.reduce((s,b)=>s+b.pct,0)/BM.length);

// ── SCORE ARC ────────────────────────────────────────────────────────
function renderScore(){
  const s=calcScore(),circ=503,offset=circ-(s/100*circ);
  document.getElementById('scoreNum').textContent=s;
  setTimeout(()=>{
    document.getElementById('scoreArc').style.strokeDashoffset=offset;
    document.getElementById('glowRing').style.strokeDashoffset=offset;
  },100);
  const lbl=s>=80?'Elite Optimization Territory':s>=65?'Strong Foundation · Above Average':s>=50?'Developing · Clear Upside Available':'Early Stage · High Response Potential';
  document.getElementById('scoreStatus').textContent=lbl;
}

// ── INSIGHT ──────────────────────────────────────────────────────────
function renderInsight(){
  const s=calcScore();
  const bad=BM.filter(b=>b.pct<68).sort((a,b)=>a.pct-b.pct);
  const head=s>=80?'Your baseline is elite — focus shifts to refinement and maintenance.':
             s>=65?`Strong foundation. ${bad.length?bad[0].label+' is your highest-leverage gap.':'Keep building.'}`:
             `${bad.length} markers need attention. Priority: ${bad.slice(0,2).map(b=>b.label).join(' + ')}.`;
  const det=s>=75?'You\'re in the top tier of optimized individuals. Marginal gains at this level come from precision: sleep consistency, targeted micronutrients, and training periodization.':
            'The biggest gains come from attacking your lowest-performing markers first. Small improvements across multiple systems compound rapidly.';
  document.getElementById('ihead').textContent=head;
  document.getElementById('ibod').textContent=det;
}

// ── ACTION CARDS ─────────────────────────────────────────────────────
function getTopActions(){
  const buckets={};
  BM.filter(b=>b.pct<68).forEach(b=>{
    ['diet','sleep','exercise'].forEach(k=>{
      if(!b.rec[k])return;
      const key=k+'||'+b.rec[k];
      if(!buckets[key])buckets[key]={type:k,text:b.rec[k],markers:[],count:0,why:b.insight};
      buckets[key].markers.push(b.label);
      buckets[key].count++;
    });
  });
  return Object.values(buckets).sort((a,b)=>b.count-a.count).slice(0,3);
}

    const mStr=a.markers.slice(0,4).join(', ')+(a.markers.length>4?` +${a.markers.length-4}…`:'');
    const card=document.createElement('div');
    card.className='acard';card.id='ac'+i;
    card.innerHTML=`
      <div class="atop" onclick="toggleAction(${i})">
        <div class="aico">${ICONS[a.type]||'⚡'}</div>
        <div class="atxt">
          <div class="atitle">${brief}</div>
          <div class="asub">Addresses ${a.count} marker${a.count>1?'s':''}: ${mStr}</div>
        </div>
        <div class="abadge">${a.count}×</div>
        <div class="achev">▾</div>
      </div>
      <div class="aexp" id="aex${i}">
        <div class="aexin">
          <div class="axs">
            <div class="axlbl">${TLBLS[a.type]||'Protocol'}</div>
            <div class="axtxt">${a.text}</div>
          </div>
          <div class="axs">
            <div class="axlbl">Why This Works</div>
            <div class="axtxt">${a.why}</div>
          </div>
          <div class="axs">
            <div class="axlbl">Affected Markers</div>
            <div class="axtags">${a.markers.map(m=>`<span class="axtag">${m}</span>`).join('')}</div>
          </div>
        </div>
      </div>`;
    el.appendChild(card);
  });
}
function toggleAction(i){document.getElementById('ac'+i).classList.toggle('open')}

let curTab='daily';
function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.gtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderGoals();
}
function renderGoals(){
  const el=document.getElementById('goalList');el.innerHTML='';
  const done=JSON.parse(localStorage.getItem('grail_g_'+curTab)||'{}');
  GOALS[curTab].forEach((g,i)=>{
    const ok=!!done[i];
    const d=document.createElement('div');d.className='gitem';
    d.innerHTML=`<div class="gchk${ok?' done':''}" onclick="toggleGoal(${i},this)">${ok?'✓':''}</div><div class="gbody"><div class="gtxt${ok?' done':''}">${g.text}</div><div class="gwhy">${g.why}</div></div><div class="gbadge">${g.badge}</div>`;
    el.appendChild(d);
  });
}
function toggleGoal(i){
  const done=JSON.parse(localStorage.getItem('grail_g_'+curTab)||'{}');
  done[i]=!done[i];localStorage.setItem('grail_g_'+curTab,JSON.stringify(done));renderGoals();
}

// ── BODY DOTS ─────────────────────────────────────────────────────────
const tip=document.getElementById('btip');
function makeDot(bm,svgEl,gid){
  const g=svgEl.getElementById(gid);if(!g)return;
  const col=gc(bm.pct);
  // Glow ring
  const r=document.createElementNS('http://www.w3.org/2000/svg','circle');
  r.setAttribute('cx',bm.x);r.setAttribute('cy',bm.y);r.setAttribute('r','8');
  r.setAttribute('fill','none');r.setAttribute('stroke',col);r.setAttribute('stroke-width','1.5');r.setAttribute('opacity','0.24');
  g.appendChild(r);
  // Core dot
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',bm.x);c.setAttribute('cy',bm.y);c.setAttribute('r','4.8');
  c.setAttribute('fill',col);c.setAttribute('cursor','pointer');
  c.style.filter=`drop-shadow(0 0 5px ${col})`;
  g.appendChild(c);
  c.addEventListener('mouseenter',e=>{
    tip.classList.add('on');
    document.getElementById('btipN').textContent=bm.label;
    document.getElementById('btipS').textContent=bm.system+' · '+gl(bm.pct);
    document.getElementById('btipF').style.width=bm.pct+'%';
    document.getElementById('btipF').style.background=col;
    moveTip(e);
  });
  c.addEventListener('mousemove',moveTip);
  c.addEventListener('mouseleave',()=>tip.classList.remove('on'));
  c.addEventListener('click',()=>openDetail(bm));
}
function moveTip(e){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px'}
function renderDots(){
  const fS=document.getElementById('svgFront'),bS=document.getElementById('svgBack');
  BM.filter(b=>b.side==='front').forEach(b=>makeDot(b,fS,'dotsF'));
  BM.filter(b=>b.side==='back').forEach(b=>makeDot(b,bS,'dotsB'));
}
function setView(v){
  const f=document.getElementById('svgFront'),b=document.getElementById('svgBack');
  const bf=document.getElementById('btnFront'),bb=document.getElementById('btnBack');
  if(v==='front'){f.style.display='';b.style.display='none';bf.classList.add('active');bb.classList.remove('active')}
  else{f.style.display='none';b.style.display='';bb.classList.add('active');bf.classList.remove('active')}
}

// ── DETAIL ────────────────────────────────────────────────────────────
function openDetail(bm){
  const col=gc(bm.pct);
  document.getElementById('ddot').style.background=col;
  document.getElementById('dlbl').textContent=bm.label;
  document.getElementById('dsys').textContent=bm.system+' · '+gl(bm.pct).toUpperCase();
  document.getElementById('dbar').style.width=bm.pct+'%';
  document.getElementById('dbar').style.background=col;
  document.getElementById('dins').textContent=bm.insight;
  const re=document.getElementById('drecs');re.innerHTML='';
  [['diet','Eat & Supplement'],['sleep','Sleep'],['exercise','Move & Train']].forEach(([k,lbl])=>{
    if(!bm.rec[k])return;
    const d=document.createElement('div');d.className='drec';
    d.innerHTML=`<div class="drec-t">${lbl}</div><div class="drec-b">${bm.rec[k]}</div>`;
    re.appendChild(d);
  });
  if(bm.pct>=68&&bm.rec.green){
    const d=document.createElement('div');d.className='drec';
    d.innerHTML=`<div class="drec-t" style="color:#2DC46A">Status: Optimal</div><div class="drec-b" style="color:#2DC46A;opacity:.75;font-style:italic">${bm.rec.green}</div>`;
    re.appendChild(d);
  }
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open')}

renderScore();renderInsight();renderActions();renderDots();renderGoals();
