<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Looms</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Space Grotesk', sans-serif;
    color: #fff;
  }

  /* ── CANVAS STARS ── */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── ACCRETION DISK RINGS ── */
  #disk {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    pointer-events: none;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotateX(72deg);
  }

  .ring-1 {
    width: 340px; height: 340px;
    border-color: rgba(201,150,60,0.55);
    box-shadow: 0 0 40px rgba(201,150,60,0.18), inset 0 0 40px rgba(201,150,60,0.08);
    animation: spin 22s linear infinite;
  }
  .ring-2 {
    width: 420px; height: 420px;
    border-color: rgba(201,150,60,0.30);
    box-shadow: 0 0 60px rgba(201,150,60,0.10);
    animation: spin 34s linear infinite reverse;
  }
  .ring-3 {
    width: 520px; height: 520px;
    border-color: rgba(201,150,60,0.15);
    animation: spin 48s linear infinite;
  }
  .ring-4 {
    width: 640px; height: 640px;
    border-color: rgba(180,130,50,0.08);
    animation: spin 65s linear infinite reverse;
  }

  @keyframes spin {
    from { transform: translate(-50%, -50%) rotateX(72deg) rotateZ(0deg); }
    to   { transform: translate(-50%, -50%) rotateX(72deg) rotateZ(360deg); }
  }

  /* ── FOOTPRINT GHOST (inside rings) ── */
  #feet-ghost {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    height: 260px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
    pointer-events: none;
  }

  #feet-ghost img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(1) sepia(0.7) brightness(0.65) contrast(1.4);
    opacity: 0.28;
    animation: ghost-pulse 8s ease-in-out infinite;
  }

  @keyframes ghost-pulse {
    0%, 100% { opacity: 0.28; }
    50%       { opacity: 0.45; }
  }

  /* ── GLOW CORE ── */
  #core-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,150,60,0.06) 0%, transparent 70%);
    box-shadow: 0 0 120px rgba(201,150,60,0.12);
    animation: breathe 6s ease-in-out infinite;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
  }

  /* ── CONTENT ── */
  #content {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 60px 24px 80px;
  }

  /* ── PHOTO FRAME ── */
  #photo-wrap {
    position: relative;
    margin-bottom: 48px;
    opacity: 0;
    animation: fade-up 1s ease 0.4s forwards;
  }

  #photo-frame {
    width: min(200px, 52vw);
    height: min(200px, 52vw);
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid rgba(201,150,60,0.4);
    box-shadow:
      0 0 0 8px rgba(201,150,60,0.06),
      0 0 0 16px rgba(201,150,60,0.03),
      0 0 60px rgba(201,150,60,0.20);
    position: relative;
    z-index: 2;
  }

  #photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* lumi-hand image if present */
  #hand-img {
    width: min(160px, 44vw);
    height: min(160px, 44vw);
    object-fit: cover;
    border-radius: 50%;
    border: 1px solid rgba(201,150,60,0.35);
    box-shadow: 0 0 40px rgba(201,150,60,0.18);
    display: block;
    margin: 0 auto 0;
  }

  /* ── NAME ── */
  #name {
    font-size: clamp(3rem, 16vw, 6rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #fff;
    text-shadow:
      0 0 40px rgba(201,150,60,0.5),
      0 0 80px rgba(201,150,60,0.2);
    margin-bottom: 40px;
    opacity: 0;
    animation: fade-up 1s ease 1.0s forwards;
  }

  /* ── MESSAGE CARD ── */
  #card {
    max-width: 360px;
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,150,60,0.18);
    border-radius: 4px;
    padding: 28px 28px 24px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0;
    animation: fade-up 1s ease 1.6s forwards;
    margin-bottom: 36px;
  }

  #card-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(201,150,60,0.55);
    margin-bottom: 16px;
  }

  #card-text {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.1rem, 4.5vw, 1.35rem);
    color: rgba(255,255,255,0.85);
    line-height: 1.75;
  }

  #card-text em {
    color: rgba(201,150,60,0.9);
    font-style: normal;
    font-weight: 600;
  }

  /* ── PAPITO ── */
  #papito {
    font-size: clamp(0.75rem, 3.2vw, 0.9rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(201,150,60,0.5);
    text-transform: uppercase;
    opacity: 0;
    animation: fade-up 1s ease 2.3s forwards;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="core-glow"></div>

<div id="disk">
  <div id="feet-ghost">
    <img src="/static/footprints.jpg" alt="">
  </div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>
</div>

<div id="content">
  <div id="name">Looms</div>

  <div id="card">
    <div id="card-label">lunchbox note</div>
    <div id="card-text">
      <em>WOWZA</em> — 7 nights went by in like 12 hours.<br>
      That was an awesome visit.<br><br>
      This is just a little lunchbox note<br>
      like I always used to.<br><br>
      I tried to catch some fog this morning.<br>
      <em>I mist.</em><br><br>
      💛💛
    </div>
  </div>

  <div id="papito">you are perfect to papito</div>
</div>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  const n = Math.floor(canvas.width * canvas.height / 1800);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4,
      a: 0.2 + Math.random() * 0.8,
      speed: 0.003 + Math.random() * 0.005,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function draw(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const alpha = s.a * (0.35 + 0.65 * Math.abs(Math.sin(t * s.speed + s.phase)));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,245,220,${alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(draw);
</script>
</body>
</html>
