<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Sloany</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  /* Star field */
  #stars { position: fixed; inset: 0; z-index: 0; }

  /* Main content */
  #content {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  #content.visible { opacity: 1; }

  /* Scan line effect on image */
  #footprint-wrap {
    position: relative;
    width: min(280px, 72vw);
    height: min(280px, 72vw);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }

  #footprint-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
    filter: drop-shadow(0 0 24px rgba(0,220,220,0.4)) drop-shadow(0 0 60px rgba(0,200,220,0.2));
    clip-path: inset(100% 0 0 0);
    transition: clip-path 1.8s cubic-bezier(0.16, 1, 0.3, 1);
    mix-blend-mode: screen;
    background: #000;
  }

  #footprint-img.revealed { clip-path: inset(0% 0 0 0); }

  /* Scan line */
  #scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, rgba(0,220,255,0.8), transparent);
    top: 0;
    opacity: 0;
    box-shadow: 0 0 12px rgba(0,220,255,0.6);
  }

  /* Glow ring */
  #glow-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(0,200,220,0.15);
    box-shadow: 0 0 30px rgba(0,200,220,0.08), inset 0 0 30px rgba(0,200,220,0.04);
    opacity: 0;
    transition: opacity 1s ease 1.5s;
  }

  #glow-ring.visible { opacity: 1; }

  /* Corner brackets */
  .bracket {
    position: absolute;
    width: 18px; height: 18px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .bracket.tl { top: 0; left: 0; border-top: 1px solid rgba(0,220,255,0.5); border-left: 1px solid rgba(0,220,255,0.5); }
  .bracket.tr { top: 0; right: 0; border-top: 1px solid rgba(0,220,255,0.5); border-right: 1px solid rgba(0,220,255,0.5); }
  .bracket.bl { bottom: 0; left: 0; border-bottom: 1px solid rgba(0,220,255,0.5); border-left: 1px solid rgba(0,220,255,0.5); }
  .bracket.br { bottom: 0; right: 0; border-bottom: 1px solid rgba(0,220,255,0.5); border-right: 1px solid rgba(0,220,255,0.5); }
  .bracket.visible { opacity: 1; }

  /* Name */
  #name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(3.5rem, 14vw, 6rem);
    letter-spacing: 0.18em;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,220,255,0.3), 0 0 80px rgba(0,200,220,0.15);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    margin-bottom: 20px;
    line-height: 1;
  }

  #name.visible { opacity: 1; transform: translateY(0); }

  /* Message */
  #message {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(0.75rem, 3.2vw, 1rem);
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.55);
    text-align: center;
    max-width: min(340px, 88vw);
    line-height: 1.8;
    opacity: 0;
    transition: opacity 1.2s ease;
    padding: 0 20px;
  }

  #message.visible { opacity: 1; }

  /* From */
  #from {
    margin-top: 28px;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(0,220,255,0.35);
    opacity: 0;
    transition: opacity 1s ease;
  }

  #from.visible { opacity: 1; }

  /* Floating particles */
  .fp {
    position: fixed;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(0,200,220,0.6);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="content">
  <div id="footprint-wrap">
    <div id="glow-ring"></div>
    <img id="footprint-img" src="/static/footprints.jpg" alt="your footprints">
    <div id="scan-line"></div>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
  </div>

  <div id="name">Sloany</div>

  <div id="message">You're one of a kind.<br>Technically, one of two,<br>but still — yeah, you know what I mean.</div>

  <div id="from">— Dad</div>
</div>

<script>
// ── STAR FIELD ──────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');
let stars    = [];

function initStars() {
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
  stars = [];
  const count = Math.floor((innerWidth * innerHeight) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.2,
      a: Math.random(),
      speed: 0.003 + Math.random() * 0.006,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const alpha = s.a * (0.4 + 0.6 * Math.abs(Math.sin(t * s.speed + s.phase)));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,230,255,${alpha})`;
    ctx.fill();
  }
}

// ── FLOATING PARTICLES ──────────────────────────────────────
function spawnParticles() {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'fp';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top  = (70 + Math.random() * 30) + 'vh';
    document.body.appendChild(p);
    animateParticle(p);
  }
}

function animateParticle(p) {
  const duration = 8000 + Math.random() * 12000;
  const x = (Math.random() - 0.5) * 120;
  const y = -(200 + Math.random() * 300);
  p.animate([
    { transform: 'translate(0,0)', opacity: 0 },
    { opacity: 0.7, offset: 0.1 },
    { opacity: 0.3, offset: 0.8 },
    { transform: `translate(${x}px,${y}px)`, opacity: 0 }
  ], { duration, easing: 'ease-out' }).onfinish = () => {
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top  = (70 + Math.random() * 30) + 'vh';
    animateParticle(p);
  };
}

// ── SCAN LINE ───────────────────────────────────────────────
function runScanLine() {
  const line = document.getElementById('scan-line');
  const wrap = document.getElementById('footprint-wrap');
  const h    = wrap.offsetHeight;
  line.style.opacity = '1';
  line.style.transition = `top ${1.8}s cubic-bezier(0.16,1,0.3,1)`;
  setTimeout(() => { line.style.top = h + 'px'; }, 50);
  setTimeout(() => { line.style.opacity = '0'; }, 2000);
}

// ── SEQUENCE ────────────────────────────────────────────────
let rafId;
function loop(t) {
  drawStars(t);
  rafId = requestAnimationFrame(loop);
}

initStars();
requestAnimationFrame(loop);
spawnParticles();

// Reveal sequence
setTimeout(() => {
  document.getElementById('content').classList.add('visible');
}, 300);

setTimeout(() => {
  document.getElementById('footprint-img').classList.add('revealed');
  document.querySelectorAll('.bracket').forEach(b => b.classList.add('visible'));
  runScanLine();
}, 600);

setTimeout(() => {
  document.getElementById('glow-ring').classList.add('visible');
}, 1800);

setTimeout(() => {
  document.getElementById('name').classList.add('visible');
}, 2200);

setTimeout(() => {
  document.getElementById('message').classList.add('visible');
}, 3200);

setTimeout(() => {
  document.getElementById('from').classList.add('visible');
}, 4000);

window.addEventListener('resize', () => { initStars(); canvas.width = innerWidth; canvas.height = innerHeight; });
</script>
</body>
</html>
